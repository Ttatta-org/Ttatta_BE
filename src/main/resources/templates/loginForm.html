<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>관리자 LOGIN</title>
    <style>
        :root { --card-w: 320px; }
        html, body { height: 100%; }
        * , *::before, *::after { box-sizing: border-box; } /* 핵심 */ /* [web:17] */

        body {
            margin: 0;
            background: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR",
            "Apple SD Gothic Neo", "Malgun Gothic", "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }
        .center {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: var(--card-w);
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e6e6e6;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .card-header {
            background: #f0f2f4;
            color: #555;
            padding: 12px 16px;
            font-weight: 600;
            letter-spacing: .3px;
            border-bottom: 1px solid #e0e0e0;
        }
        .card-body { padding: 16px; }
        .form-row { margin-bottom: 12px; }
        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            max-width: 100%;              /* 컨테이너 초과 방지 보강 */ /* [web:3] */
            padding: 8px 10px;
            border: 1px solid #cfcfcf;
            border-radius: 3px;
            background: #fafafa;
            outline: none;
        }
        input:focus { border-color: #9db2c3; box-shadow: 0 0 0 3px rgba(0,123,255,.08); }
        .actions { display: flex; justify-content: center; margin-top: 6px; }
        .btn {
            border: 0;
            padding: 8px 14px;
            border-radius: 4px;
            background: linear-gradient(#5b6b7a, #3e4a55);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { filter: brightness(1.05); }
        .message { margin-top: 10px; font-size: 12px; }
        .error { color: #c0392b; }
        .logout { color: #2e7d32; }
    </style>
</head>
<body>
<div class="center">
    <!-- form action은 Security의 loginProcessingUrl과 동일해야 함 -->
    <form class="card" th:action="@{/loginProc}" method="post">
        <div class="card-header">[ 위치정보조회 ]  따따 관리자 로그인</div>
        <div class="card-body">
            <div class="form-row">
                <label for="email">ID</label>
                <!-- usernameParameter가 "email"이므로 name="email" 유지 (ID 텍스트 입력 원하면 type="text") -->
                <input id="email" name="email" type="text" autocomplete="username" placeholder="아이디를 입력하세요" required />
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" required />
            </div>

<!--            &lt;!&ndash; CSRF 토큰: 빠지면 403 발생 &ndash;&gt;-->
<!--            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

            <div class="actions">
                <button type="submit" class="btn">로그인</button>
            </div>

            <!-- 로그인 실패/로그아웃 메시지 -->
            <div class="message error" th:if="${param.error}">이메일/비밀번호가 올바르지 않습니다.</div>
            <div class="message logout" th:if="${param.logout}">정상적으로 로그아웃되었습니다.</div>
        </div>
    </form>
</div>
</body>
</html>
