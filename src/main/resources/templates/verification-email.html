<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[따따] 이메일 인증</title>
</head>
<body style="margin: 0; padding: 0; background-color: #FFFFFF; text-align: center;">

<!-- 메일 컨테이너 -->
<table width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
        <td align="center">
            <table width="400" cellspacing="0" cellpadding="0" border="0" style="background-color: #FFEFE4; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px;">

                <!-- 로고 -->
                <tr>
                    <td align="center" style="padding-bottom: 16px;">
                        <img src="cid:image" width="80" height="auto" alt="따따 로고">
                    </td>
                </tr>

                <!-- 인증 코드 박스 -->
                <tr>
                    <td align="center">
                        <table width="250" height="80" cellspacing="0" cellpadding="0" border="0" style="background-color: #FEF6F2; border-radius: 15px; width: 250px; max-width: 100%;">
                            <tr>
                                <td align="center" style="font-size: 28px; font-weight: bold; color: #000;">
                                    <span th:text="${verificationCode}">123456</span>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- 설명 문구 -->
                <tr>
                    <td align="center" style="padding-top: 20px; font-size: 14px; color: #555; line-height: 1.6;">
                        따따에서 요청하신 인증번호를 보내드립니다.<br>
                        아래 인증번호 6자리를 인증번호 입력창에 입력해주세요.
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
