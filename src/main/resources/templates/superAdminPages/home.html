<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그 조회 선택</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f9fafb;
        }
        h1 { margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            text-decoration: none;
            font-size: 16px;
            color: #333;
            transition: background 0.2s, color 0.2s;
        }
        .btn:hover {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>

<h1>로그 조회 선택</h1>

<a class="btn" href="/super/admin/admin-log">관리자 접속 로그 조회</a>
<a class="btn" href="/admin/location-log">위치정보 로그 조회</a>

</body>
</html>
