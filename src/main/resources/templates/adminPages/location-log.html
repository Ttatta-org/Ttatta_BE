<!-- templates/adminPages/location-log.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>위치정보 이용,제공사실 확인자료</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script th:src="@{/js/location_log.js}"></script>
    <style>
        :root { --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --accent:#3b82f6; --radius:12px; }
        html, body { height: 100%; } * { box-sizing: border-box; }
        body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic","Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--text); }
        .wrap { max-width:1200px; margin:32px auto; padding:0 20px; }
        .title { font-size: clamp(22px, 3.5vw, 34px); font-weight: 800; letter-spacing: -0.02em; margin: 8px 0 18px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:0 10px 24px rgba(0,0,0,.06); overflow:hidden; }
        .card-header { display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); background:#fbfbfd; }
        .filter-form { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
        .filter-form input[type="text"], .filter-form input[type="date"] { padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; }
        .btn { appearance:none; border:1px solid var(--border); background:#fff; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px; }
        .btn-primary { border-color:transparent; background:var(--accent); color:#fff; }
        .btn:focus { outline:2px solid rgba(59,130,246,.35); outline-offset:2px; }

        .table-wrap { width:100%; overflow-x:auto; }
        table { width:100%; border-collapse:collapse; min-width: 820px; } /* 전체 폭을 조금 줄여 비고 칼럼 자리 확보 */
        thead th { position:sticky; top:0; background:#f9fafb; font-size:12px; color:#374151; text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
        tbody td { padding:10px; border-bottom:1px solid var(--border); vertical-align:middle; font-size:13px; }
        tbody tr:hover { background:#fafafa; }
        .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }

        /* 칼럼 너비 조정 (서비스 폭 축소 + 전체 컴팩트) */
        .col-select { width:42px; }
        .col-idx    { width:56px; }
        .col-target { width:16%; max-width:220px; }
        .col-path   { width:14%; max-width:180px; }
        .col-service{ width:17%; max-width:210px; } /* ← 서비스 칼럼 살짝 더 좁게 */
        .col-rec    { width:16%; max-width:210px; }
        .col-time   { width:160px; }
        .col-remark { width:160px; } /* 비고 칼럼 자리 확보 */
        .ellipsis { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        .empty { padding:24px; color:var(--muted); text-align:center; font-size:14px; }
        .toolbar { margin-left:auto; display:flex; gap:8px; }
        .muted { color:var(--muted); font-size:12px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="title">위치정보 이용,제공사실 확인자료</div>

    <div class="card">
        <!-- 상단: 검색/필터 폼 -->
        <div class="card-header">
            <form class="filter-form" th:action="@{/admin/location-log}" method="get">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어" />
                <input type="date" name="fromDate" th:value="${fromDate}" />
                <span class="muted">~</span>
                <input type="date" name="toDate" th:value="${toDate}" />
                <input type="hidden" name="page" th:value="${page != null ? page : 0}" />
<!--                <input type="hidden" name="size" th:value="${size != null ? size : 20}" />-->
                <button type="submit" class="btn btn-primary">검색</button>
            </form>

            <!-- 삭제 버튼(권한 있는 경우에만 보이게) -->
            <div class="toolbar" sec:authorize="hasAnyRole('SUPER_ADMIN')">
                <button class="btn" type="button" onclick="document.getElementById('deleteForm').submit()">선택 삭제</button>
            </div>
        </div>

        <!-- 삭제 form: 체크박스 ids + 현재 검색조건 hidden으로 전송 -->
        <form id="deleteForm" th:action="@{/admin/location-log/delete}" method="post">
            <input type="hidden" name="keyword"  th:value="${keyword}" />
            <input type="hidden" name="fromDate" th:value="${fromDate}" />
            <input type="hidden" name="toDate"   th:value="${toDate}" />
            <input type="hidden" name="page"     th:value="${page}" />
<!--            <input type="hidden" name="size"     th:value="${size}" />-->

            <div class="table-wrap">
                <table>
                    <colgroup>
                        <col class="col-select" sec:authorize="hasAnyRole('SUPER_ADMIN')"/>
                        <col class="col-idx"/>
                        <col class="col-target"/>
                        <col class="col-path"/>
                        <col class="col-service"/>
                        <col class="col-rec"/>
                        <col class="col-time"/>
                        <col class="col-remark"/>
                    </colgroup>
                    <thead>
                    <tr>
                        <th sec:authorize="hasAnyRole('SUPER_ADMIN')">
                            <input type="checkbox" id="checkAll" />
                        </th>
                        <th>#</th>
                        <th>대상</th>
                        <th>취득경로</th>
                        <th>제공 서비스</th>
                        <th>제공받는 자</th>
                        <th>이용일시</th>
                        <th>비고</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- 데이터 있을 때 -->
                    <tr th:each="log,iter : ${logs}">
                        <td sec:authorize="hasAnyRole('SUPER_ADMIN')">
                            <input type="checkbox" name="ids" th:value="${log.id}" />
                        </td>

                        <td class="mono" th:text="${iter.count}">1</td>
                        <td><span class="ellipsis" th:text="${log.target}">회원ID/디바이스 등</span></td>
                        <td><span class="ellipsis" th:text="${log.acquisitionPath}">GPS/기지국/Wi-Fi</span></td>
                        <td><span class="ellipsis" th:text="${log.provisionalService}">근처 일기 알림</span></td>
                        <td><span class="ellipsis" th:text="${log.recipient}">—</span></td>
                        <td class="mono" th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2025-09-21 20:12:03</td>

                        <!-- 비고: 조건부 출력 -->
                        <td>
                            <span class="ellipsis"
                                  th:text="${log.provisionalService == '위치기반리마인드 알림 서비스 / 알림 on' ? '주기적으로 요청 보냄' : ''}"></span>
                            <!-- 부분 일치가 필요하면 아래 주석 예시로 교체
                            th:text="${#strings.contains(log.provisionalService, '위치기반리마인드 알림 서비스') ? '주기적으로 요청 보냄' : ''}"
                            -->
                        </td>
                    </tr>

                    <!-- 데이터 없을 때 -->
                    <tr th:if="${logs == null or #lists.isEmpty(logs)}">
                        <td colspan="8" class="empty">표시할 기록이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </form>
    </div>

    <!-- (옵션) 페이지네이션 -->
    <div class="wrap" th:if="${totalPage != null and totalPage > 1}">
        <nav aria-label="페이지 이동"
             style="display:flex; gap:6px; justify-content:center; margin-top:14px; align-items:center;">

            <!-- 이전 버튼: 첫 페이지일 땐 비활성화 -->
            <a class="btn"
               th:if="${page > 0}"
               th:href="@{/admin/location-log(
                   page=${page - 1},
                   keyword=${keyword},
                   fromDate=${fromDate},
                   toDate=${toDate}
               )}">&lt;</a>
            <span th:if="${page == 0}" class="btn" style="pointer-events:none; opacity:.5;">&lt;</span>

            <!-- 현재 페이지 / 전체 페이지 -->
            <span th:text="${page + 1}"></span>
            <span>/</span>
            <span th:text="${totalPage}"></span>

            <!-- 다음 버튼: 마지막 페이지일 땐 비활성화 -->
            <a class="btn"
               th:if="${page + 1 < totalPage}"
               th:href="@{/admin/location-log(
                   page=${page + 1},
                   keyword=${keyword},
                   fromDate=${fromDate},
                   toDate=${toDate}
               )}">&gt;</a>
            <span th:if="${page + 1 == totalPage}" class="btn" style="pointer-events:none; opacity:.5;">&gt;</span>
        </nav>
    </div>
</div>

<script>
    // 전체 선택(권한 있는 경우에만 요소가 존재)
    const checkAll = document.getElementById('checkAll');
    if (checkAll) {
        checkAll.addEventListener('change', (e) => {
            document.querySelectorAll('input[name="ids"]').forEach(cb => cb.checked = e.target.checked);
        });
    }
</script>
</body>
</html>
